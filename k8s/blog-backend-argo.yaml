apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blog-backend
  namespace: argocd
  annotations:
    # 👇 这是让 argocd-image-updater 工作的关键配置
    argocd-image-updater.argoproj.io/image-list: backend=192.168.23.128:80/blog-backend/blog-backend:latest
    argocd-image-updater.argoproj.io/backend.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-repository: github:https://github.com/Bready1222/blog-backend.git

spec:
  project: default
  source:
    repoURL: https://github.com/Bready1222/blog-backend.git
    path: k8s
    targetRevision: master
  destination:
    server: https://kubernetes.default.svc
    namespace: blog
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true