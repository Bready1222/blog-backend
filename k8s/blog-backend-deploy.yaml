apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-backend
  namespace: blog
  labels:
    app: blog-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-backend
  template:
    metadata:
      labels:
        app: blog-backend
    spec:
      imagePullSecrets:
      - name: harbor-secret
      
      containers:
      - name: backend
        image: 192.168.23.128:80/blog-backend/blog-backend:1.0.143
        
        ports:
        - containerPort: 8080
        
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://192.168.31.156:3306/blog_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "123456"
        
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10

---

apiVersion: v1
kind: Service
metadata:
  name: blog-backend-svc
  namespace: blog
spec:
  selector:
    app: blog-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort